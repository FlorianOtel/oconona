# OpenCode Orchestra — global default config
# Per-project override: ${OPENCODE_PROJECT_DIR}/.opencode/orchestra/config.yaml
# Design reference: docs/design.md (in this repo)

# -----------------------------------------------------------------------------
# Autonomy preset (combines Axis X — OpenCode permission mode — with
# Axis Y — orchestra stage gates). v1 supports `default` and `acceptEdits`
# only; `auto` is stubbed, see §10.2 of the design doc.
# -----------------------------------------------------------------------------
orchestra_mode: default            # v1: default | acceptEdits   (v2: + auto)

# -----------------------------------------------------------------------------
# Stage gates — used by /brain to decide whether to pause for user approval
# between Sequential Phase Architecture stages.
# -----------------------------------------------------------------------------
gates:
  after_research:  skip            # skip | notify | approve
  after_plan:      approve         # THE gate — v1: via ExitPlanMode
  after_implement: skip
  after_review:    auto_loop       # skip | auto_loop | approve
  after_verify:    notify

approval_method: exit_plan_mode    # exit_plan_mode | slash_command | sentinel_file
review_loop_max: 3                 # cap G5 iterations

# -----------------------------------------------------------------------------
# Commit policy. v1 is always explicit; v2 `auto` preset overrides.
# -----------------------------------------------------------------------------
commit:
  policy: explicit                 # v1 | v2 auto overrides to commit_auto

# -----------------------------------------------------------------------------
# v2-only keys below — honored only when orchestra_mode: auto.
# Present here so config shape is stable across v1 and v2.
# -----------------------------------------------------------------------------
crosscheck_loop_max: 5             # cap for replan→implement cycles under auto
token_budget_usd:   5              # soft cap for auto runs; 0 disables

commit_auto:
  branch_prefix:    "orchestra/auto-"
  branch_protect:   ["main", "master"]
  checkpoint_every_iteration: true

test_gate:
  detect_from: [pytest, pnpm, npm, make, cargo]
  required_for_finalize: true
  # project override:
  # command: "pytest -q tests/"

# -----------------------------------------------------------------------------
# Per-invocation session housekeeping
# -----------------------------------------------------------------------------
# Each /brain or /duo invocation creates a fresh subdirectory under
# .opencode/orchestra/sessions/<id>/ for its PLAN.md, TASKS.json,
# RESEARCH.md, review-comments.md.  Lazy cleanup runs at the start of
# every /brain or /duo invocation.
housekeeping:
  session_retention_days: 30       # delete sessions/ subdirs older than N days

# -----------------------------------------------------------------------------
# SoHoAI cost API (Stage 2 telemetry)
# When enabled, telemetry-summarize.py queries GET ${ANTHROPIC_BASE_URL}/v1/usage/stats
# for cost_usd as primary source; falls back to litellm then pricing.yaml.
# -----------------------------------------------------------------------------
sohoai:
  enabled: true
  timeout_s: 5
  db_path: "/mnt/nfs/__Backups/SoHoAI--databases/sqlite/telemetry.db"
